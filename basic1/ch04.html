<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            table {
                border-collapse: collapse;
            }
            table, td {
                border: 1px solid #000000;
            }

            td {
                width: 50px;
                height: 50px;
            }
        </style>
    </head>
    <body>
        <table>
            <tbody>
                <tr>    <!--첫번째 줄-->
                    <td></td>
                    <td rowspan="3"></td>
                    <td></td>
                    <td rowspan="7"></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>    <!--두번째 줄-->
                    <td></td>
                    <td></td>
                    <td colspan="3"></td>
                </tr>
                <tr>    <!--세번째 줄-->
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>    <!--네번째 줄-->
                    <td colspan="3"></td>
                    <td colspan="3"></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td rowspan="3"></td>
                </tr>
                <tr>    <!--다섯번째 줄-->
                    <td colspan="3"></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>    <!--여섯번째 줄-->
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
