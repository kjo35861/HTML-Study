<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            let age = 20;
            let hasTicket = true;

            if (age > 17 && hasTicket == true) {
                console.log("입장 가능");
            } else if (age < 18 || hasTicket == false) {
                console.log("입장 불가");
            } else if (!hasTicket) {
                console.log("입장 불가");
            }
            
        </script>
    </body>
