<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            console.log(0 || "기본값");           // 결과: 기본값
            console.log("" || "대체값");          // 결과: 대체값
            console.log("사용자" && "환영합니다"); // 결과: 환영합니다
            console.log(null && "출력됨");       // 결과: null

            /*
            && = 가장 먼저 만난 false를 반환, false가 없으면 가장 마지막 true를 반환
            || =  가장 먼저 만난 true를 반환, ture가 없으면 가장 마지막 false를 반환 
            */
        </script>
    </body>
</html>
