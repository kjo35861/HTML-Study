<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            for (i = 0; i < 30; i++) {
                j = i+1
                if (j % 3 == 0 && j % 5 == 0) {
                    console.log("FizzBuzz")
                    continue;
                }
                if (j % 3 == 0) {
                    console.log("Fizz");
                    continue;
                }
                if (j % 5 == 0) {
                    console.log("Buzz");
                    continue;
                }
                console.log(j)
            }
        </script>
    </body>
</html>
