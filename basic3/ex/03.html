<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            console.log(10 == "10");    //  ture         정답 :: true
            console.log(10 === "10");   //  false        정답 :: flase
            console.log(10 != "10");    //  false        정답 :: false
            console.log(10 !== "10");   //  true         정답 :: true
            console.log(5 >= 5);        //  true         정답 :: true
            console.log(null === undefined); //  flase    정답 :: true
        </script>
    </body>
