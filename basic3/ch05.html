<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            // 배열 + 객체
            // 배열 선언 초기화
            const arr = [];
            const arr2 = new Array();

            const studetns = [];
            const s1 = {
                name: "김준일",
                age: 33,
            };
            const s2 = {
                name: "김준이",
                age: 34,
            }
            studetns.push(s1);
            studetns.push(s2);

            const students2 = [
                {
                    name: "김준일",
                    age: 33,
                },
                {
                    name: "김준이",
                    age: 34,
                },
            ]

            const students3 = [
                ...students2,       // 스프레드 문법(객체 또는 배열의 요소들을 복제)
                {
                    name: "김준삼",
                    age: 35,
                }
            ]

            const students4 = [
                ...students2,
                {
                    ...students3[2],
                    address: "동래구",
                }
            ]
            console.log(students4)

            const nums = [10, 20, 30, 40];
            const nums2 = [...nums, 50];
            console.log(nums);
            console.log(nums2);

            const user = {
                username: "aaa",
                password: "1234",
            }

            const user2 = {
                ...user,
                name: "김준일",
            }
            console.log(user);
            console.log(user2);

        </script>
    </body>
</html>
