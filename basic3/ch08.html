<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            html, body {
                margin: 0;
                height: 100vh;
            }

            .container {
                display: flex;
                /* flex-direction: column; */
                justify-content: center;
                align-items: center;
                gap: 20px;
                margin: 0 auto;
                width: 1200px;
                height: 100%;
                overflow: auto;
            }

            .card {
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                margin-bottom: 20px;
                box-shadow: 0 0 5px #00000044;
                padding: 20px;
            }

            .input-box {
                position: relative;
                margin-bottom: 10px;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                padding: 5px 10px;
                width: 360px;
                height: 50px;
                overflow: hidden;

                & > label {
                    transition: all 0.3s ease-in-out;
                    transform: translateY(-50%);
                    position: absolute;
                    top: 50%;
                    left: 10px;
                    background-color: transparent;
                    font-size: 14px;
                    color: #444;
                }

                & > input {
                    transition: all 0.3s ease-in-out;
                    position: relative;
                    z-index: 10;
                    outline: none;
                    border: none;
                    width: 100%;
                    height: 100%;
                    background-color: #00000000;
                }
            }

            .input-is-not-empty {
                & > label {
                    font-size: 12px;
                    top: 25%;
                }

                & > input {
                    top: 30%;
                    height: 80%;
                }
            }

            .register-button {
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                width: 100%;
                height: 40px;
                background-color: #006caf;
                color: #fafafa;
                cursor: pointer;

                &:hover {
                    background-color: #005489;
                }

                &:active {
                    background-color: #003e65;
                }
            }

            .option-items-top {
                display: flex;
                justify-content: space-between;
                gap: 30px;
                width: 100%;
            }

            .search-input {
                box-sizing: border-box;
                padding: 0 10px;
                width: 300px;
            }

            .df-row {
                display: flex;
            }

            .btn {
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                padding: 8px 15px;
                /* width: 100%; */
                /* height: 40px; */
                background-color: #555;
                color: #fafafa;
                cursor: pointer;

                &:hover {
                    background-color: #444;
                }

                &:active {
                    background-color: #333;
                }
            }

            .btn.edit {
                background-color: #e4ac33;
                &:hover {
                    background-color: #b98c2b;
                }

                &:active {
                    background-color: #d8a330;
                }
            }

            .btn.delete {
                background-color: rgb(233, 56, 56);
                &:hover {
                    background-color: rgb(182, 7, 7);
                }

                &:active {
                    background-color: #d33939;
                }
            }

            .user-table {
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-collapse: collapse;
                border-radius: 4px;
                width: 500px;
                overflow: hidden;

                & th, & td {
                    box-sizing: border-box;
                    border: 1px solid #dbdbdb;
                    padding: 5px 10px;
                    text-align: center;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card">
                <div class="input-box">
                    <label for="un">사용자 이름</label>
                    <input type="text" id="un" name="username">
                </div>
                <div class="input-box">
                    <label for="pw">비밀번호</label>
                    <input type="password" id="pw" name="password">
                </div>
                <button class="register-button">사용자 정보 등록</button>
            </div>

            <div>
                <div class="card">
                    <div class="option-items-top">
                        <div class="df-row">
                            <input type="text" class="search-input">
                            <button class="btn">검색</button>
                        </div>
                        <div class="df-row">
                            <button class="btn edit">수정</button>
                            <button class="btn delete">삭제</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="all-Check"></th>
                                <th>ID</th>
                                <th>사용자 이름</th>
                                <th>비밀번호</th>
                                <th>삭제</th>
                            </tr>
                        </thead>
                        <tbody>
    
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <script>

            let userList = [];

            function autoIncrement() {
                let currentId = 0;

                return function() {
                    currentId++;
                    return currentId;
                }
            }

            const getNewId = autoIncrement();

            const inputBoxs = document.querySelectorAll(".input-box")

            for (let inputBox of inputBoxs) {
                const inputElement = inputBox.querySelector("input");

                inputElement.onfocus = (event) => {
                    inputBox.classList.add("input-is-not-empty");
                }

                inputElement.onblur = (event) => {
                    if (!event.target.value) {
                        inputBox.classList.remove("input-is-not-empty");
                    }
                }
            }
            // const inputElements = inputBoxs[0].querySelectorAll(".input-box > input");

            const registerButton = document.querySelector(".register-button");

            registerButton.onclick = () => {
                const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"))

                let newUser = {
                    id: getNewId(),
                }

                Array.from(inputs).forEach(element => {
                    const {name, value} = element;
                    newUser = {
                        ...newUser,
                        [name]: value,
                    }
                });

                userList = [
                    ...userList,
                    newUser,
                ];

                console.log(userList);
                tableRender();
                // const tableBody = document.querySelector(".user-table > tbody");
                // tableBody.innerHTML = userList.map(userList => `<tr><td>${userList.id}</td><td>${userList.username}</td><td>${userList.password}</td></tr>`).join("")
            }
            
            function handleDeleteOnClick(id) {
                userList = userList.filter(user => user.id !== id);
                tableRender();
            }

            function tableRender() {
                const tbody = document.querySelector(".user-table > tbody")
                tbody.innerHTML = userList.map(user =>`
                    <tr>
                        <th><input type="checkbox" id="row-check"></th>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.password}</td>
                        <td><button onclick = "handleDeleteOnClick(${user.id})">삭제</button></td>
                    </tr>`).join("");
            }
            
            // 체크박스 모두선택 코드
            const allcheck = document.getElementById("all-Check");
            allcheck.onclick = (e) => {
                const check = e.target.checked;
                const rowcheck = document.querySelectorAll("#row-check")

                rowcheck.forEach(rowcheck => {
                    rowcheck.checked = check;
                })
            }

            const editButton = document.querySelector(".edit")
            editButton.onclick = () => {
                registerButton.disabled = true;
            }


        </script>
    </body>
</html>
